<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BookStack</title>
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
  <div class="brand">Book<span>Stack</span></div>
  <button class="btn-icon" onclick="openSettings()" title="Impostazioni">
    <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="10" cy="10" r="2.5"/>
      <path d="M10 2v1.5M10 16.5V18M2 10h1.5M16.5 10H18M4.1 4.1l1.1 1.1M14.8 14.8l1.1 1.1M15.9 4.1l-1.1 1.1M5.2 14.8l-1.1 1.1"/>
    </svg>
  </button>
</header>

<main>

  <!-- ── Scan card ── -->
  <div class="card">
    <div class="tabs">
      <button class="tab" id="tab-camera" onclick="switchTab('camera')">
        <svg width="14" height="14" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
          <rect x="1" y="5" width="18" height="13" rx="2"/>
          <circle cx="10" cy="12" r="3"/>
          <path d="M7 5l1.5-2.5h3L13 5"/>
        </svg>
        Fotocamera
      </button>
      <button class="tab active" id="tab-manual" onclick="switchTab('manual')">
        <svg width="14" height="14" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 17.5V3.5a1 1 0 011-1h8l4 4V17.5a1 1 0 01-1 1H4a1 1 0 01-1-1z"/>
          <path d="M11 2.5V7h4.5"/><path d="M7 11h6M7 14h4"/>
        </svg>
        Manuale
      </button>
    </div>

    <!-- Camera panel -->
    <div id="panel-camera" style="display:none;">
      <div class="camera-wrap" id="camera-wrap">
        <div class="camera-idle" id="camera-idle">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
            <rect x="1" y="6" width="22" height="16" rx="2.5"/>
            <circle cx="12" cy="14" r="3.5"/>
            <path d="M8 6l1.8-3h4.4L16 6"/>
          </svg>
          <p>Premi il bottone per attivare la fotocamera e scansionare il codice a barre</p>
        </div>
        <video id="camera-video" autoplay playsinline style="display:none;"></video>
        <div class="scan-overlay" id="scan-overlay" style="display:none;">
          <div class="scan-frame">
            <div class="corner-bl"></div>
            <div class="corner-br"></div>
            <div class="scan-line"></div>
          </div>
        </div>
      </div>
      <div class="camera-status" id="camera-status">Fotocamera non attiva</div>
      <button class="btn-primary" id="btn-camera-toggle" onclick="toggleCamera()">Attiva fotocamera</button>
    </div>

    <!-- Manual panel -->
    <div id="panel-manual">
      <div class="input-group">
        <label for="isbn-input">Codice ISBN</label>
        <input type="text" id="isbn-input" placeholder="Es. 9788807880933"
          maxlength="17" inputmode="numeric"
          onkeydown="if(event.key==='Enter') searchISBN()"/>
      </div>
      <div style="margin-top:0.875rem;">
        <button class="btn-primary" id="btn-search" onclick="searchISBN()">Cerca libro</button>
      </div>
      <div class="new-entry-toggle-wrap">
        <span class="new-entry-toggle" onclick="toggleNewEntry()">
          <svg id="new-entry-chevron" width="11" height="11" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" style="transition:transform 0.2s;">
            <path d="M5 8l5 5 5-5"/>
          </svg>
          Crea una nuova voce…
        </span>
      </div>

      <!-- New entry form (collapsed by default) -->
      <div id="new-entry-form" style="display:none;">
        <div class="new-entry-divider"></div>
        <div class="form-grid">
          <div class="input-group full">
            <label for="ne-title">Titolo <span class="required-mark">*</span></label>
            <input type="text" id="ne-title" placeholder="Titolo del libro"/>
          </div>
          <div class="input-group full">
            <label for="ne-author">Autore</label>
            <input type="text" id="ne-author" placeholder="Nome Cognome"/>
          </div>
          <div class="input-group">
            <label for="ne-publisher">Editore</label>
            <input type="text" id="ne-publisher" placeholder="Es. Einaudi"/>
          </div>
          <div class="input-group">
            <label for="ne-year">Anno</label>
            <input type="text" id="ne-year" placeholder="Es. 1984" maxlength="4" inputmode="numeric"/>
          </div>
          <div class="input-group full">
            <label for="ne-isbn">ISBN</label>
            <input type="text" id="ne-isbn" placeholder="Es. 9788807880933" maxlength="17" inputmode="numeric"/>
          </div>
          <div class="input-group full">
            <label for="ne-cover">URL copertina</label>
            <input type="text" id="ne-cover" placeholder="https://…"/>
          </div>
          <div class="input-group full">
            <label for="ne-location">Luogo</label>
            <div class="select-wrap">
              <select id="ne-location"></select>
            </div>
            <input type="text" id="ne-location-custom" placeholder="Oppure scrivi un luogo…" style="margin-top:0.375rem;"/>
          </div>
          <div class="input-group full">
            <label for="ne-status">Stato di lettura</label>
            <div class="select-wrap">
              <select id="ne-status">
                <option value="Da leggere">Da leggere</option>
                <option value="In lettura">In lettura</option>
                <option value="Letto">Letto</option>
                <option value="Sospeso">Sospeso</option>
              </select>
            </div>
          </div>
          <div class="input-group full">
            <label for="ne-notes">Note</label>
            <textarea id="ne-notes" placeholder="Annotazioni personali…"></textarea>
          </div>
        </div>
        <div style="margin-top:0.875rem; display:flex; flex-direction:column; gap:0.5rem;">
          <button class="btn-primary" onclick="addManualEntry()">Aggiungi alla collezione</button>
          <button class="btn-secondary" onclick="toggleNewEntry(true)">Annulla</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ── Result card ── -->
  <div id="result-section">
    <div class="card">
      <div class="book-meta">
        <div class="book-title"  id="r-title">—</div>
        <div class="book-author" id="r-author">—</div>
        <div class="book-tags">
          <span class="tag"      id="r-year">—</span>
          <span class="tag"      id="r-publisher">—</span>
          <span class="tag isbn" id="r-isbn">—</span>
          <span class="tag"      id="r-source" style="display:none;"></span>
        </div>
      </div>

      <div class="form-grid">
        <div class="input-group full">
          <label for="r-location">Luogo</label>
          <div class="select-wrap">
            <select id="r-location"></select>
          </div>
          <input type="text" id="r-location-custom"
            placeholder="Oppure scrivi un luogo…"
            style="margin-top:0.375rem;"/>
        </div>
        <div class="input-group full">
          <label for="r-status">Stato di lettura</label>
          <div class="select-wrap">
            <select id="r-status">
              <option value="Da leggere">Da leggere</option>
              <option value="In lettura">In lettura</option>
              <option value="Letto">Letto</option>
              <option value="Sospeso">Sospeso</option>
            </select>
          </div>
        </div>
        <div class="input-group full">
          <label for="r-notes">Note</label>
          <textarea id="r-notes" placeholder="Annotazioni personali…"></textarea>
        </div>
      </div>

      <div class="result-actions">
        <button class="btn-primary" onclick="addToCollection()">Aggiungi alla collezione</button>
        <button class="btn-secondary" onclick="dismissResult()">Annulla</button>
      </div>
    </div>
  </div>

  <!-- ── Collection ── -->
  <div>
    <div class="section-header">
      <span class="section-title">Collezione</span>
      <div class="collection-controls">
        <label for="per-page-select" class="per-page-label">Libri per pagina</label>
        <div class="select-wrap select-wrap-inline">
          <select id="per-page-select" onchange="changePerPage(this.value)">
            <option value="5">5</option>
            <option value="10" selected>10</option>
            <option value="15">15</option>
            <option value="25">25</option>
          </select>
        </div>
        <span class="count-badge" id="collection-count">0</span>
      </div>
    </div>

    <div class="card" id="collection-list">
      <div class="collection-empty" id="collection-empty">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 19.5A2.5 2.5 0 016.5 17H20"/>
          <path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/>
        </svg>
        Nessun libro ancora.<br>Cerca un ISBN per iniziare.
      </div>
    </div>

    <!-- Pagination -->
    <div class="pagination" id="pagination" style="display:none;">
      <button class="page-btn" id="page-prev" onclick="changePage(-1)">
        <svg width="14" height="14" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M13 4l-6 6 6 6"/>
        </svg>
      </button>
      <span class="page-info" id="page-info">1 / 1</span>
      <button class="page-btn" id="page-next" onclick="changePage(1)">
        <svg width="14" height="14" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M7 4l6 6-6 6"/>
        </svg>
      </button>
    </div>
  </div>

</main>

<!-- ── Settings modal ── -->
<div class="modal-overlay" id="settings-modal" onclick="closeSettingsOutside(event)">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">Luoghi di conservazione</span>
      <button class="btn-icon" onclick="closeSettings()">
        <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
          <path d="M4 4l12 12M16 4L4 16"/>
        </svg>
      </button>
    </div>
    <div class="location-list" id="settings-location-list"></div>
    <div class="add-location">
      <input type="text" id="new-location-input" placeholder="Nuovo luogo…"
        onkeydown="if(event.key==='Enter') addLocation()"/>
      <button onclick="addLocation()">Aggiungi</button>
    </div>

    <div class="settings-divider"></div>

    <input type="file" id="import-file-input" accept=".csv" style="display:none;" onchange="importCatalog(event)">
    <button class="btn-import" onclick="document.getElementById('import-file-input').click()">
      <svg width="15" height="15" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
        <path d="M10 13V3M6 7l4-4 4 4"/>
        <path d="M3 15v1a2 2 0 002 2h10a2 2 0 002-2v-1"/>
      </svg>
      Importa catalogo…
    </button>
    <div id="import-feedback" style="display:none;"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- ── Confirm modal ── -->
<div class="modal-overlay" id="confirm-modal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="confirm-title">Conferma</span>
    </div>
    <p id="confirm-message" class="confirm-message"></p>
    <div class="confirm-actions">
      <button class="btn-primary btn-danger" id="confirm-ok" onclick="confirmAction()">Conferma</button>
      <button class="btn-secondary" onclick="closeConfirm()">Annulla</button>
    </div>
  </div>
</div>

<!-- ── Footer ── -->
<footer class="app-footer">
  <div class="footer-exports">
    <button class="btn-footer-action" onclick="exportCSV()">
      <svg width="14" height="14" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
        <path d="M10 3v10M6 13l4 4 4-4"/>
        <path d="M3 15v1a2 2 0 002 2h10a2 2 0 002-2v-1"/>
      </svg>
      Esporta CSV
    </button>
    <button class="btn-footer-action btn-drive" onclick="exportToGoogleDrive()">
      <img src="svg/drive.svg" width="14" height="14" alt="" style="display:block;">
      Esporta su Google Drive
    </button>
  </div>
  <span class="delete-all-link" onclick="confirmDeleteAll()">Elimina catalogo</span>
</footer>

<!-- ── Edit modal ── -->
<div class="modal-overlay" id="edit-modal" onclick="closeEditOutside(event)">
  <div class="modal modal-tall">
    <div class="modal-header">
      <span class="modal-title">Modifica voce</span>
      <button class="btn-icon" onclick="closeEdit()">
        <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
          <path d="M4 4l12 12M16 4L4 16"/>
        </svg>
      </button>
    </div>
    <div class="form-grid">
      <div class="input-group full">
        <label for="ed-title">Titolo <span class="required-mark">*</span></label>
        <input type="text" id="ed-title"/>
      </div>
      <div class="input-group full">
        <label for="ed-author">Autore</label>
        <input type="text" id="ed-author"/>
      </div>
      <div class="input-group">
        <label for="ed-publisher">Editore</label>
        <input type="text" id="ed-publisher"/>
      </div>
      <div class="input-group">
        <label for="ed-year">Anno</label>
        <input type="text" id="ed-year" maxlength="4" inputmode="numeric"/>
      </div>
      <div class="input-group full">
        <label for="ed-isbn">ISBN</label>
        <input type="text" id="ed-isbn" maxlength="17" inputmode="numeric"/>
      </div>
      <div class="input-group full">
        <label for="ed-cover">URL copertina</label>
        <input type="text" id="ed-cover" placeholder="https://…"/>
      </div>
      <div class="input-group full">
        <label for="ed-location">Luogo</label>
        <div class="select-wrap">
          <select id="ed-location"></select>
        </div>
        <input type="text" id="ed-location-custom" placeholder="Oppure scrivi un luogo…" style="margin-top:0.375rem;"/>
      </div>
      <div class="input-group full">
        <label for="ed-status">Stato di lettura</label>
        <div class="select-wrap">
          <select id="ed-status">
            <option value="Da leggere">Da leggere</option>
            <option value="In lettura">In lettura</option>
            <option value="Letto">Letto</option>
            <option value="Sospeso">Sospeso</option>
          </select>
        </div>
      </div>
      <div class="input-group full">
        <label for="ed-notes">Note</label>
        <textarea id="ed-notes"></textarea>
      </div>
    </div>
    <div class="confirm-actions" style="margin-top:1rem;">
      <button class="btn-primary" onclick="saveEdit()">Salva modifiche</button>
      <button class="btn-secondary" onclick="closeEdit()">Annulla</button>
    </div>
  </div>
</div>

<!-- ZXing -->
<script src="https://cdn.jsdelivr.net/npm/@zxing/library@0.21.3/umd/index.min.js"></script>
<!-- App modules (order matters) -->
<script src="js/api.js"></script>
<script src="js/camera.js"></script>
<script src="js/app.js"></script>

</body>
</html>
